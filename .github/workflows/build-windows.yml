name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Pin the established VS2022 image instead of the moving windows-latest/VS2026 image.
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      CLEANFRAME_FFMPEG_DIR: ${{ github.workspace }}\third_party\ffmpeg\bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.423

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'ffmpeg.zip'
          $expanded = Join-Path $env:RUNNER_TEMP 'ffmpeg'
          Invoke-WebRequest 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile $zip
          Expand-Archive $zip -DestinationPath $expanded -Force
          $bin = Get-ChildItem $expanded -Directory | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName 'bin' }
          New-Item -ItemType Directory -Force 'third_party\ffmpeg\bin' | Out-Null
          Copy-Item (Join-Path $bin 'ffmpeg.exe') 'third_party\ffmpeg\bin\ffmpeg.exe'
          Copy-Item (Join-Path $bin 'ffprobe.exe') 'third_party\ffmpeg\bin\ffprobe.exe'
          & 'third_party\ffmpeg\bin\ffmpeg.exe' -version

      - name: Verify source layout
        shell: pwsh
        run: |
          $required = @(
            'CleanFrame.Video2.sln',
            'src\CleanFrame.Video2.App\CleanFrame.Video2.App.csproj',
            'src\CleanFrame.Video2.Worker\CleanFrame.Video2.Worker.csproj',
            'src\CleanFrame.Video2.Engine\Processing\TemporalReconstructor.cs',
            'src\CleanFrame.Video2.Engine\Detection\StaticOverlayDetector.cs',
            'tests\CleanFrame.Video2.Tests\TemporalPipelineMaskTests.cs'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path -PathType Leaf)) { throw "Missing required file: $path" }
          }
          $source = (Get-ChildItem src,tests -Recurse -File | ForEach-Object { Get-Content $_.FullName -Raw }) -join "`n"
          if ($source -match 'PySide6|PyInstaller|delogo=') { throw 'Legacy or banned implementation token found.' }
          if ($source -notmatch 'CalcOpticalFlowFarneback') { throw 'Optical flow implementation missing.' }
          if ($source -notmatch 'InpaintTypes.Telea' -or $source -notmatch 'InpaintTypes.NS') { throw 'Spatial fallbacks missing.' }

      - name: Restore
        run: dotnet restore CleanFrame.Video2.sln -p:Platform=x64

      - name: Run tests
        run: dotnet test tests/CleanFrame.Video2.Tests/CleanFrame.Video2.Tests.csproj -c Release -p:Platform=x64 --no-restore --logger "trx;LogFileName=cleanframe-tests.trx" --results-directory TestResults

      - name: Publish worker
        run: dotnet publish src/CleanFrame.Video2.Worker/CleanFrame.Video2.Worker.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained true --no-restore -o artifacts/worker

      - name: Worker self-test
        shell: pwsh
        run: |
          & 'artifacts\worker\CleanFrame.Video2.Worker.exe' --self-test | Tee-Object -FilePath 'artifacts\worker-self-test.json'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish WinUI app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force 'artifacts' | Out-Null
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\app'
          msbuild 'src\CleanFrame.Video2.App\CleanFrame.Video2.App.csproj' `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:PublishReadyToRun=false `
            "/p:PublishDir=$publishDir" `
            /bl:artifacts\winui-publish.binlog `
            /fl `
            "/flp:logfile=artifacts\winui-publish.log;verbosity=diagnostic"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Assemble portable artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'artifacts\app\worker' | Out-Null
          New-Item -ItemType Directory -Force 'artifacts\app\tools\ffmpeg\bin' | Out-Null
          Copy-Item 'artifacts\worker\*' 'artifacts\app\worker' -Recurse -Force
          Copy-Item 'third_party\ffmpeg\bin\ffmpeg.exe' 'artifacts\app\tools\ffmpeg\bin\ffmpeg.exe'
          Copy-Item 'third_party\ffmpeg\bin\ffprobe.exe' 'artifacts\app\tools\ffmpeg\bin\ffprobe.exe'
          Copy-Item 'docs\THIRD_PARTY_NOTICES.md' 'artifacts\app\THIRD_PARTY_NOTICES.md'
          Copy-Item 'README.md' 'artifacts\app\README.md'
          Get-ChildItem 'artifacts\app' -Recurse | Select-Object FullName, Length | Out-File 'artifacts\artifact-file-list.txt'

      - name: Upload diagnostic and test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CleanFrameVideo2-TestResults
          path: |
            TestResults
            artifacts/worker-self-test.json
            artifacts/winui-publish.log
            artifacts/winui-publish.binlog
          if-no-files-found: warn

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: CleanFrameVideo2-Windows-x64
          path: artifacts/app
          if-no-files-found: error
          retention-days: 14
