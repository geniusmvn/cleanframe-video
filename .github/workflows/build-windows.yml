name: Build ERASA VIDEO 2

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PYTHONUTF8: 1
  PYTHONIOENCODING: utf-8

jobs:
  source-checks:
    name: 1 Source checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --disable-pip-version-check numpy==1.26.4 opencv-python-headless==4.10.0.84 PyYAML==6.0.2
      - run: python scripts/verify_source.py
      - run: python -m unittest discover -s tests/python -v

  core-tests:
    name: 2 Core and Worker.Core tests
    needs: source-checks
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore tests without platform override
        run: dotnet restore tests/Erasa.Video2.Tests/Erasa.Video2.Tests.csproj
      - name: Build and test Any CPU
        run: dotnet test tests/Erasa.Video2.Tests/Erasa.Video2.Tests.csproj -c Release --logger "trx;LogFileName=erasa-video2-tests.trx" --results-directory TestResults
      - name: Upload core logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erasa-core-test-results
          path: TestResults
          if-no-files-found: warn

  worker-windows:
    name: 3 Worker Host and FFmpeg
    needs: core-tests
    runs-on: windows-2022
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'ffmpeg.zip'
          $expanded = Join-Path $env:RUNNER_TEMP 'ffmpeg'
          Invoke-WebRequest 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile $zip
          Expand-Archive $zip -DestinationPath $expanded -Force
          $bin = Get-ChildItem $expanded -Directory | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName 'bin' }
          New-Item -ItemType Directory -Force 'artifacts\worker\tools\ffmpeg\bin' | Out-Null
          Copy-Item (Join-Path $bin 'ffmpeg.exe') 'artifacts\worker\tools\ffmpeg\bin\ffmpeg.exe'
          Copy-Item (Join-Path $bin 'ffprobe.exe') 'artifacts\worker\tools\ffmpeg\bin\ffprobe.exe'
      - name: Publish thin Worker Host
        run: dotnet publish src/Erasa.Video2.Worker.Host/Erasa.Video2.Worker.Host.csproj -c Release -r win-x64 --self-contained true -o artifacts/worker-publish
      - name: Assemble worker artifact
        shell: pwsh
        run: |
          Copy-Item 'artifacts\worker-publish\*' 'artifacts\worker' -Recurse -Force
          if (-not (Test-Path 'artifacts\worker\Erasa.Video2.Worker.Host.exe')) { throw 'Worker Host missing.' }
          if (-not (Test-Path 'artifacts\worker\Python\lama_bridge.py')) { throw 'LaMa bridge missing.' }
          if (-not (Test-Path 'artifacts\worker\Runtime\runtime-manifest.json')) { throw 'Runtime manifest missing.' }
      - name: Worker FFmpeg utility self-test
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'artifacts\utility-test' | Out-Null
          @{ command = 'self-test-utilities'; jobDirectory = (Resolve-Path 'artifacts\utility-test').Path } |
            ConvertTo-Json | Set-Content 'artifacts\utility-request.json' -Encoding utf8NoBOM
          & 'artifacts\worker\Erasa.Video2.Worker.Host.exe' --request 'artifacts\utility-request.json' |
            Tee-Object -FilePath 'artifacts\worker-utility-test.jsonl'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path 'artifacts\utility-test\fixture.png')) { throw 'Worker did not create thumbnail.' }
      - uses: actions/upload-artifact@v4
        with:
          name: erasa-worker-windows-x64
          path: artifacts/worker
          if-no-files-found: error
      - name: Upload worker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erasa-worker-test-results
          path: |
            artifacts/worker-utility-test.jsonl
            artifacts/utility-test
          if-no-files-found: warn

  lama-cpu:
    name: 4 Original LaMa CPU integration
    needs: worker-windows
    runs-on: windows-2022
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: erasa-worker-windows-x64
          path: artifacts/worker
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache tested LaMa runtime
        uses: actions/cache@v4
        with:
          path: artifacts/runtime-test
          key: erasa-lama-cpu-v2-${{ hashFiles('src/Erasa.Video2.Worker.Core/Runtime/runtime-manifest.json', 'src/Erasa.Video2.Worker.Core/Python/lama_bridge.py') }}
      - name: Install original LaMa runtime through Worker.Core
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          @{ command = 'runtime-install'; runtimeDirectory = (Join-Path $env:GITHUB_WORKSPACE 'artifacts\runtime-test'); profile = 'cpu' } |
            ConvertTo-Json | Set-Content 'artifacts\runtime-install-request.json' -Encoding utf8NoBOM
          & 'artifacts\worker\Erasa.Video2.Worker.Host.exe' --request 'artifacts\runtime-install-request.json' |
            Tee-Object -FilePath 'artifacts\runtime-install.jsonl'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path 'artifacts\runtime-test\lama-source\saicinpainting\training\modules\ffc.py')) { throw 'Original advimman/lama source missing.' }
          if (-not (Test-Path 'artifacts\runtime-test\model\models\best.ckpt')) { throw 'Big-LaMa checkpoint missing.' }
      - name: Original LaMa CPU self-test
        shell: pwsh
        run: |
          @{ command = 'self-test-runtime'; runtimeDirectory = (Resolve-Path 'artifacts\runtime-test').Path; profile = 'cpu' } |
            ConvertTo-Json | Set-Content 'artifacts\runtime-selftest-request.json' -Encoding utf8NoBOM
          & 'artifacts\worker\Erasa.Video2.Worker.Host.exe' --request 'artifacts\runtime-selftest-request.json' |
            Tee-Object -FilePath 'artifacts\runtime-selftest.jsonl'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Original LaMa video integration test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force 'artifacts\integration' | Out-Null
          & 'artifacts\worker\tools\ffmpeg\bin\ffmpeg.exe' -y -v error `
            -f lavfi -i 'testsrc2=size=128x128:rate=4:duration=3' `
            -f lavfi -i 'sine=frequency=880:sample_rate=48000:duration=3' `
            -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest 'artifacts\integration\input.mp4'
          python -c "from pathlib import Path; p=Path(r'artifacts/integration/mask.pgm'); w=h=128; a=bytearray(w*h); [a.__setitem__(y*w+x,255) for y in range(44,84) for x in range(44,84)]; p.write_bytes(f'P5\\n{w} {h}\\n255\\n'.encode()+a)"
          @{ command='process'; jobId=[guid]::NewGuid(); inputPath=(Resolve-Path 'artifacts\integration\input.mp4').Path; maskPath=(Resolve-Path 'artifacts\integration\mask.pgm').Path; outputPath=(Join-Path $env:GITHUB_WORKSPACE 'artifacts\integration\output.mp4'); jobDirectory=(Join-Path $env:GITHUB_WORKSPACE 'artifacts\integration\state'); runtimeDirectory=(Resolve-Path 'artifacts\runtime-test').Path; profile='cpu'; quality='Fast' } |
            ConvertTo-Json | Set-Content 'artifacts\integration-request.json' -Encoding utf8NoBOM
          & 'artifacts\worker\Erasa.Video2.Worker.Host.exe' --request 'artifacts\integration-request.json' |
            Tee-Object -FilePath 'artifacts\integration.jsonl'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path 'artifacts\integration\output.mp4')) { throw 'LaMa integration output missing.' }
          $probe = & 'artifacts\worker\tools\ffmpeg\bin\ffprobe.exe' -v error -show_entries stream=codec_type -of csv=p=0 'artifacts\integration\output.mp4'
          if ($probe -notcontains 'video') { throw 'Output video stream missing.' }
          if ($probe -notcontains 'audio') { throw 'Output audio stream missing.' }
      - name: Upload LaMa logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erasa-lama-cpu-test-results
          path: |
            artifacts/runtime-install.jsonl
            artifacts/runtime-selftest.jsonl
            artifacts/integration.jsonl
            artifacts/integration/output.mp4
          if-no-files-found: warn

  winui-windows:
    name: 5 WinUI app and final artifact
    needs: [core-tests, worker-windows, lama-cpu]
    runs-on: windows-2022
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/download-artifact@v4
        with:
          name: erasa-worker-windows-x64
          path: artifacts/worker
      - name: Restore WinUI project only
        run: dotnet restore src/Erasa.Video2.App/Erasa.Video2.App.csproj -p:Platform=x64 -r win-x64
      - name: Publish WinUI app
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts\app'
          msbuild 'src\Erasa.Video2.App\Erasa.Video2.App.csproj' /t:Publish /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true /p:PublishReadyToRun=false "/p:PublishDir=$publishDir" /bl:artifacts\winui-publish.binlog /fl "/flp:logfile=artifacts\winui-publish.log;verbosity=diagnostic"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Assemble final artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'artifacts\app\worker' | Out-Null
          Copy-Item 'artifacts\worker\*' 'artifacts\app\worker' -Recurse -Force
          Copy-Item 'README_VI.md' 'artifacts\app\README_VI.md'
          Copy-Item 'THIRD_PARTY_NOTICES.md' 'artifacts\app\THIRD_PARTY_NOTICES.md'
          if (-not (Test-Path 'artifacts\app\ERASA.Video.exe')) { throw 'ERASA.Video.exe missing.' }
          if (-not (Test-Path 'artifacts\app\worker\Erasa.Video2.Worker.Host.exe')) { throw 'Worker Host missing from app.' }
      - name: WinUI startup smoke test
        shell: pwsh
        run: |
          $signal = Join-Path $env:RUNNER_TEMP 'erasa-ui-started.txt'
          $env:ERASA_SMOKE_TEST_PATH = $signal
          $process = Start-Process 'artifacts\app\ERASA.Video.exe' -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          while ((Get-Date) -lt $deadline -and -not (Test-Path $signal) -and -not $process.HasExited) { Start-Sleep -Milliseconds 300 }
          if ($process.HasExited -and -not (Test-Path $signal)) { throw "App exited during startup with code $($process.ExitCode)." }
          if (-not (Test-Path $signal)) { throw 'App did not report successful XAML startup.' }
          if (-not $process.HasExited) { & taskkill.exe /PID $process.Id /T /F | Out-Null }
          Remove-Item Env:ERASA_SMOKE_TEST_PATH
      - name: Worker failure does not close WinUI
        shell: pwsh
        run: |
          $signal = Join-Path $env:RUNNER_TEMP 'erasa-worker-failure-ui-alive.txt'
          $env:ERASA_WORKER_FAILURE_SMOKE_PATH = $signal
          $process = Start-Process 'artifacts\app\ERASA.Video.exe' -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          while ((Get-Date) -lt $deadline -and -not (Test-Path $signal) -and -not $process.HasExited) { Start-Sleep -Milliseconds 300 }
          if (-not (Test-Path $signal)) { throw 'UI did not survive expected worker failure.' }
          if ($process.HasExited) { throw 'UI exited after worker failure.' }
          & taskkill.exe /PID $process.Id /T /F | Out-Null
          Remove-Item Env:ERASA_WORKER_FAILURE_SMOKE_PATH
      - name: Upload WinUI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erasa-winui-diagnostics
          path: |
            artifacts/winui-publish.log
            artifacts/winui-publish.binlog
          if-no-files-found: warn
      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: ERASA-VIDEO-2-Windows-x64
          path: artifacts/app
          if-no-files-found: error
          retention-days: 14
