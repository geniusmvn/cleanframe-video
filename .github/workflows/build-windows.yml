name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      MODEL_URL: https://github.com/Sanster/models/releases/download/add_big_lama/big-lama.pt
      MODEL_MD5: e3aa4aaa15225a33ec84f9f4bc47e500

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'ffmpeg.zip'
          $expanded = Join-Path $env:RUNNER_TEMP 'ffmpeg'
          Invoke-WebRequest 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile $zip
          Expand-Archive $zip -DestinationPath $expanded -Force
          $bin = Get-ChildItem $expanded -Directory | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName 'bin' }
          New-Item -ItemType Directory -Force 'artifacts\runtime\tools\ffmpeg\bin' | Out-Null
          Copy-Item (Join-Path $bin 'ffmpeg.exe') 'artifacts\runtime\tools\ffmpeg\bin\ffmpeg.exe'
          Copy-Item (Join-Path $bin 'ffprobe.exe') 'artifacts\runtime\tools\ffmpeg\bin\ffprobe.exe'

      - name: Install bundled worker runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.1.2+cu118 --index-url https://download.pytorch.org/whl/cu118
          python -m pip install -r worker/requirements.txt
          New-Item -ItemType Directory -Force 'artifacts\runtime\tools\python' | Out-Null
          Copy-Item "$env:pythonLocation\*" 'artifacts\runtime\tools\python' -Recurse -Force
          New-Item -ItemType Directory -Force 'artifacts\runtime\worker' | Out-Null
          Copy-Item 'worker\main.py' 'artifacts\runtime\worker\main.py'

      - name: Download and verify LaMa model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force 'artifacts\runtime\models' | Out-Null
          Invoke-WebRequest $env:MODEL_URL -OutFile 'artifacts\runtime\models\big-lama.pt'
          $actual = (Get-FileHash 'artifacts\runtime\models\big-lama.pt' -Algorithm MD5).Hash.ToLowerInvariant()
          if ($actual -ne $env:MODEL_MD5) { throw "Model checksum mismatch: $actual" }

      - name: Restore
        run: dotnet restore LaMaStudio.sln

      - name: Test
        run: dotnet test tests/LaMaStudio.Tests/LaMaStudio.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=lamastudio-tests.trx" --results-directory TestResults

      - name: Publish desktop app
        run: dotnet publish src/LaMaStudio.App/LaMaStudio.App.csproj -c Release -r win-x64 --self-contained true --no-restore -o artifacts/app

      - name: Assemble artifact
        shell: pwsh
        run: |
          Copy-Item 'artifacts\runtime\*' 'artifacts\app' -Recurse -Force
          Copy-Item 'README_VI.md' 'artifacts\app\README_VI.md'
          Copy-Item 'THIRD_PARTY_NOTICES.md' 'artifacts\app\THIRD_PARTY_NOTICES.md'
          Copy-Item 'licenses' 'artifacts\app\licenses' -Recurse -Force

      - name: LaMa CPU self-test
        shell: pwsh
        run: |
          Push-Location artifacts/app
          & '.\tools\python\python.exe' -I '.\worker\main.py' selftest --device cpu | Tee-Object -FilePath '..\worker-self-test.jsonl'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LaMaStudio-TestResults
          path: |
            TestResults
            artifacts/worker-self-test.jsonl
          if-no-files-found: warn

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: LaMaStudio-Windows-x64
          path: artifacts/app
          if-no-files-found: error
          retention-days: 14
